def asmStringMinLen = 6
def asmStringMaxLen = 4096

def shouldAsmTransformClassEntry = { String entryName ->
    if (entryName == null || !entryName.endsWith(".class")) return false
    if (!asmTargetPrefixes.any { entryName.startsWith(it) }) return false
    if (asmExcludedPrefixes.any { entryName.startsWith(it) }) return false
    true
}

def shouldSkipAsmString = { String s ->
    if (s == null) return true
    if (s.length() < asmStringMinLen || s.length() > asmStringMaxLen) return true
    if (s.contains("\u0000")) return true
    if (s.startsWith("http://") || s.startsWith("https://")) return true
    if (s.contains("/") || s.contains("\\") || s.contains(".json") || s.contains(".png") || s.contains(".ogg")) return true
    if (s.contains("(") || s.contains(")") || s.contains(";") || s.contains("Ljava/")) return true
    if (s.contains(".") && (s.contains("fun.rich") || s.contains("rich.") || s.contains("net.minecraft") || s.contains("java."))) return true
    false
}

def encodeAsmString = { String s, int seed ->
    char[] a = s.toCharArray()
    for (int i = 0; i < a.length; i++) {
        a[i] = (char) (a[i] ^ seed ^ (i * 7 + 3))
    }
    new String(a)
}

def makeDecoderMethod = { int seed, String name ->
    MethodNode m = new MethodNode(
            Opcodes.ACC_PRIVATE | Opcodes.ACC_STATIC | Opcodes.ACC_SYNTHETIC,
            name,
            "(Ljava/lang/String;)Ljava/lang/String;",
            null,
            null
    )

    def l0 = new LabelNode()
    def l1 = new LabelNode()
    def l2 = new LabelNode()
    def l3 = new LabelNode()

    m.instructions.add(l0)
    m.instructions.add(new VarInsnNode(Opcodes.ALOAD, 0))
    m.instructions.add(new MethodInsnNode(Opcodes.INVOKEVIRTUAL, "java/lang/String", "toCharArray", "()[C", false))
    m.instructions.add(new VarInsnNode(Opcodes.ASTORE, 1))
    m.instructions.add(new InsnNode(Opcodes.ICONST_0))
    m.instructions.add(new VarInsnNode(Opcodes.ISTORE, 2))

    m.instructions.add(l1)
    m.instructions.add(new FrameNode(
            Opcodes.F_APPEND,
            2,
            (["[C", Opcodes.INTEGER] as Object[]),
            0,
            null
    ))

    m.instructions.add(new VarInsnNode(Opcodes.ILOAD, 2))
    m.instructions.add(new VarInsnNode(Opcodes.ALOAD, 1))
    m.instructions.add(new InsnNode(Opcodes.ARRAYLENGTH))
    m.instructions.add(new JumpInsnNode(Opcodes.IF_ICMPGE, l2))
    m.instructions.add(new VarInsnNode(Opcodes.ALOAD, 1))
    m.instructions.add(new VarInsnNode(Opcodes.ILOAD, 2))
    m.instructions.add(new VarInsnNode(Opcodes.ALOAD, 1))
    m.instructions.add(new VarInsnNode(Opcodes.ILOAD, 2))
    m.instructions.add(new InsnNode(Opcodes.CALOAD))
    m.instructions.add(new LdcInsnNode(seed))
    m.instructions.add(new VarInsnNode(Opcodes.ILOAD, 2))
    m.instructions.add(new IntInsnNode(Opcodes.BIPUSH, 7))
    m.instructions.add(new InsnNode(Opcodes.IMUL))
    m.instructions.add(new InsnNode(Opcodes.ICONST_3))
    m.instructions.add(new InsnNode(Opcodes.IADD))
    m.instructions.add(new InsnNode(Opcodes.IXOR))
    m.instructions.add(new InsnNode(Opcodes.IXOR))
    m.instructions.add(new InsnNode(Opcodes.I2C))
    m.instructions.add(new InsnNode(Opcodes.CASTORE))
    m.instructions.add(new IincInsnNode(2, 1))
    m.instructions.add(new JumpInsnNode(Opcodes.GOTO, l1))

    m.instructions.add(l2)
    m.instructions.add(new FrameNode(Opcodes.F_SAME, 0, null, 0, null))
    m.instructions.add(new TypeInsnNode(Opcodes.NEW, "java/lang/String"))
    m.instructions.add(new InsnNode(Opcodes.DUP))
    m.instructions.add(new VarInsnNode(Opcodes.ALOAD, 1))
    m.instructions.add(new MethodInsnNode(Opcodes.INVOKESPECIAL, "java/lang/String", "<init>", "([C)V", false))
    m.instructions.add(new InsnNode(Opcodes.ARETURN))
    m.instructions.add(l3)

    m.maxLocals = 3
    m.maxStack = 6
    m
}

def transformClassBytesAsm = { byte[] inputBytes, String entryName, int globalSeed ->
    ClassReader cr = new ClassReader(inputBytes)
    ClassNode cn = new ClassNode()
    cr.accept(cn, 0)

    int kindMask = Opcodes.ACC_INTERFACE | Opcodes.ACC_ANNOTATION | Opcodes.ACC_MODULE
    if ((cn.access & kindMask) != 0) {
        return inputBytes
    }

    cn.sourceFile = null
    cn.sourceDebug = null

    String owner = cn.name
    int classSeed = Math.abs((globalSeed * 1103515245 + owner.hashCode() * 12345) as int)
    classSeed = (classSeed % 251) + 1

    String decoderName = "__p\$d"
    while (cn.methods.any { it.name == decoderName && it.desc == "(Ljava/lang/String;)Ljava/lang/String;" }) {
        decoderName = decoderName + "_"
    }

    boolean changed = false

    cn.methods.each { MethodNode mn ->
        if ((mn.access & (Opcodes.ACC_ABSTRACT | Opcodes.ACC_NATIVE)) != 0) return
        if (mn.instructions == null || mn.instructions.size() == 0) return
        if (mn.name == "<init>" || mn.name == "<clinit>") return

        def insns = mn.instructions.toArray()
        insns.each { insn ->
            if (insn instanceof LdcInsnNode) {
                def cst = ((LdcInsnNode) insn).cst
                if (cst instanceof String) {
                    String s = (String) cst
                    if (!shouldSkipAsmString(s)) {
                        String encoded = encodeAsmString(s, classSeed)
                        InsnList repl = new InsnList()
                        repl.add(new LdcInsnNode(encoded))
                        repl.add(new MethodInsnNode(
                                Opcodes.INVOKESTATIC,
                                owner,
                                decoderName,
                                "(Ljava/lang/String;)Ljava/lang/String;",
                                false
                        ))
                        mn.instructions.insertBefore(insn, repl)
                        mn.instructions.remove(insn)
                        changed = true
                    }
                }
            }
        }
    }

    if (!changed) {
        return inputBytes
    }

    if (!cn.fields.any { it.name == "__p\$seed" }) {
        cn.fields.add(new FieldNode(
                Opcodes.ACC_PRIVATE | Opcodes.ACC_STATIC | Opcodes.ACC_FINAL | Opcodes.ACC_SYNTHETIC,
                "__p\$seed",
                "I",
                null,
                classSeed
        ))
    }

    cn.methods.add(makeDecoderMethod(classSeed, decoderName))

    ClassWriter cw = new ClassWriter(ClassWriter.COMPUTE_MAXS)
    cn.accept(cw)
    cw.toByteArray()
}

def transformJarAsm = { File inJar, File outJar ->
    outJar.parentFile.mkdirs()
    if (outJar.exists()) outJar.delete()

    int globalSeed = (int) ((System.nanoTime() ^ inJar.length() ^ inJar.name.hashCode()) & 0x7fffffffL)
    int classCount = 0
    int changedCount = 0

    JarFile jarFile = new JarFile(inJar)
    Manifest manifest = jarFile.getManifest()
    JarOutputStream jos = manifest != null ?
            new JarOutputStream(new FileOutputStream(outJar), manifest) :
            new JarOutputStream(new FileOutputStream(outJar))

    try {
        def entries = jarFile.entries()
        while (entries.hasMoreElements()) {
            def e = entries.nextElement()
            String name = e.getName()

            if (manifest != null && name.equalsIgnoreCase("META-INF/MANIFEST.MF")) {
                continue
            }

            byte[] bytes = jarFile.getInputStream(e).bytes

            if (shouldAsmTransformClassEntry(name)) {
                classCount++
                byte[] outBytes = transformClassBytesAsm(bytes, name, globalSeed)
                if (!java.util.Arrays.equals(bytes, outBytes)) {
                    changedCount++
                }
                bytes = outBytes
            }

            def newEntry = new java.util.jar.JarEntry(name)
            if (e.time > 0) newEntry.setTime(e.time)
            jos.putNextEntry(newEntry)
            jos.write(bytes)
            jos.closeEntry()
        }

        def mark = new java.util.jar.JarEntry("META-INF/pk-protect-stage3.dat")
        jos.putNextEntry(mark)
        jos.write(("seed=" + globalSeed + ";changed=" + changedCount + ";classes=" + classCount).getBytes("UTF-8"))
        jos.closeEntry()
    } finally {
        try { jos.close() } catch (ignored) {}
        try { jarFile.close() } catch (ignored) {}
    }

    [classCount: classCount, changedCount: changedCount]
}

def collectYGuardExternalFiles = { def remapTask ->
    def files = new LinkedHashSet<File>()

    def addAllFiles = { Collection<?> c ->
        if (c == null) return
        c.each { f ->
            if (f instanceof File && f.exists()) {
                files.add(f)
            }
        }
    }

    try {
        if (remapTask != null && remapTask.hasProperty("classpath")) {
            addAllFiles(remapTask.classpath.files)
        }
    } catch (ignored) {}

    try { addAllFiles(sourceSets.main.compileClasspath.files) } catch (ignored) {}
    try { addAllFiles(sourceSets.main.runtimeClasspath.files) } catch (ignored) {}

    [
            "minecraftLibraries",
            "minecraftRuntimeLibraries",
            "minecraftClientLibraries",
            "modCompileClasspath",
            "modRuntimeClasspath",
            "compileClasspath",
            "runtimeClasspath"
    ].each { cfgName ->
        try {
            def cfg = configurations.findByName(cfgName)
            if (cfg != null) addAllFiles(cfg.files)
        } catch (ignored) {}
    }

    def candidateDirs = [
            file("${rootDir}/.gradle/loom-cache"),
            file("${rootDir}/.gradle"),
            file("${gradle.gradleUserHomeDir}/caches/fabric-loom"),
            file("${gradle.gradleUserHomeDir}/caches/fabric-loom-cache"),
            file("${gradle.gradleUserHomeDir}/caches/modules-2/files-2.1/com.mojang"),
            file("${gradle.gradleUserHomeDir}/caches/modules-2/files-2.1/net.fabricmc")
    ].findAll { it.exists() }

    candidateDirs.each { dir ->
        fileTree(dir: dir, include: ["**/*.jar"]).files.each { f ->
            if (f != null && f.exists()) {
                files.add(f)
            }
        }
    }

    files
}

