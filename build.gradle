    }
}

tasks.register("yguardRelease") {
    group = "protection"
    dependsOn remapJarTask
    onlyIf { protectProfileEnabled }

    inputs.file(remapJarTask.flatMap { it.archiveFile })
    outputs.file(yGuardJarFile)

    doLast {
        def remapTask = remapJarTask.get()
        def inJar = remapTask.archiveFile.get().asFile
        def outJar = yGuardJarFile.get().asFile
        outJar.parentFile.mkdirs()
        file(".yguard").mkdirs()

        def externalFiles = collectYGuardExternalFiles(remapTask)
        println("yGuard external classpath entries: ${externalFiles.size()}")

        ant.taskdef(
                name: "yguard",
                classname: "com.yworks.yguard.YGuardTask",
                classpath: configurations.protectionTool.asPath
        )

        ant.yguard {
            inoutpair(in: inJar.absolutePath, out: outJar.absolutePath)

            externalclasses {
                path {
                    externalFiles.each { f ->
                        pathelement(location: f.absolutePath)
                    }
                }
            }

            attribute(
                    name: "SourceFile,LineNumberTable,LocalVariableTable,LocalVariableTypeTable,Signature,InnerClasses,EnclosingMethod,MethodParameters,Exceptions,AnnotationDefault,RuntimeVisibleAnnotations,RuntimeInvisibleAnnotations,RuntimeVisibleParameterAnnotations,RuntimeInvisibleParameterAnnotations,RuntimeVisibleTypeAnnotations,RuntimeInvisibleTypeAnnotations,NestHost,NestMembers,Record,PermittedSubclasses"
            ) {
                patternset {
                    include(name: "**.*")
                }
            }

            rename(
                    logfile: file(".yguard/rename-log.xml").absolutePath,
                    replaceClassNameStrings: "true",
                    scramble: "true"
            ) {
                property(name: "error-checking", value: "compatible")
                property(name: "language-conformity", value: "compatible")
                property(name: "overload-enabled", value: "false")
                property(
                        name: "expose-attributes",
                        value: "SourceFile,LineNumberTable,LocalVariableTable,LocalVariableTypeTable,Signature,InnerClasses,EnclosingMethod,MethodParameters,Exceptions,AnnotationDefault,RuntimeVisibleAnnotations,RuntimeInvisibleAnnotations,RuntimeVisibleParameterAnnotations,RuntimeInvisibleParameterAnnotations,RuntimeVisibleTypeAnnotations,RuntimeInvisibleTypeAnnotations,NestHost,NestMembers,Record,PermittedSubclasses"
                )

                adjust(
                        replaceContentPolicy: "lenient",
                        replaceContentSeparator: ".",
                        replacePathPolicy: "none"
                ) {
                    include(name: "fabric.mod.json")
                    include(name: "*.mixins.json")
                    include(name: "*.mixin.json")
                    include(name: "**/*.mixins.json")
                    include(name: "**/*.mixin.json")
                    include(name: "**/*.refmap.json")
                }

                adjust(
                        replaceContentPolicy: "none",
                        replacePathPolicy: "lenient"
                ) {
                    include(name: "META-INF/services/**")
                }

                keep(
                        sourcefile: "keep",
                        linenumbertable: "keep",
                        localvariabletable: "keep",
                        localvariabletypetable: "keep",
                        runtimevisibleannotations: "keep",
                        runtimevisibleparameterannotations: "keep",
                        runtimevisibletypeannotations: "keep",
                        runtimeinvisibleannotations: "keep",
                        runtimeinvisibleparameterannotations: "keep",
                        runtimeinvisibletypeannotations: "keep"
                ) {
                    if (!yGuardKeepPackagePatterns.isEmpty()) {
                        'package' {
                            patternset {
                                yGuardKeepPackagePatterns.each { p ->
                                    include(name: p)
                                }
                            }
                        }
                    }

                    if (!yGuardKeepClassPatterns.isEmpty()) {
                        'class'(classes: "private", methods: "private", fields: "private") {
                            patternset {
                                yGuardKeepClassPatterns.each { p ->
                                    include(name: p)
                                }
                            }
                        }
                    }

                    if (!yGuardKeepExactClasses.isEmpty()) {
                        'class'(classes: "private", methods: "private", fields: "private") {
                            patternset {
                                yGuardKeepExactClasses.each { p ->
                                    include(name: p)
                                }
                            }
                        }
                    }
                }
            }
        }

        println("yGuard jar: ${outJar.absolutePath}")
    }
}

tasks.register("asmPassRelease") {
    group = "protection"
    dependsOn "yguardRelease"
    onlyIf { protectProfileEnabled }

    inputs.file(yGuardJarFile)
    outputs.file(finalProtectedJarFile)

    doLast {
        def inJar = yGuardJarFile.get().asFile
        def outJar = finalProtectedJarFile.get().asFile
        outJar.parentFile.mkdirs()

        if (!asmPassEnabled) {
            java.nio.file.Files.copy(inJar.toPath(), outJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
            println("ASM stage disabled (enable with -PasmPass=true)")
            println("Protected jar: ${outJar.absolutePath}")
            return
        }

        def result = transformJarAsm(inJar, outJar)
        println("ASM stage changed classes: ${result.changedCount}/${result.classCount}")
        println("ASM protected jar: ${outJar.absolutePath}")
    }
}

tasks.register("protectRelease") {
    group = "protection"
    description = "Builds remapped Fabric jar and protects it with yGuard + custom ASM pass"
    dependsOn "asmPassRelease"

    doLast {
        if (!protectProfileEnabled) {
            throw new GradleException("Запусти с -PprotectProfile=true")
        }
        println("Protected jar: ${finalProtectedJarFile.get().asFile.absolutePath}")
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    repositories {}
}